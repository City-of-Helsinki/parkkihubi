name: "Tests and Checks"
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    runs-on: ubuntu-24.04
    container: "python:${{matrix.python}}-slim-trixie"
    steps:
      - uses: actions/checkout@v6

      - name: Update apt-get sources
        run: apt-get update

      - name: Install PostgreSQL, PostGIS and GDAL
        run: >
          apt-get install -y
          gdal-bin
          python3-gdal
          postgis
          postgresql
          postgresql-client
          postgresql-postgis
          libpq-dev
          build-essential

      - name: Start PostgreSQL server
        run: /etc/init.d/postgresql start

      - name: Allow root to create PostgreSQL databases
        run: su - postgres -c "createuser --createdb root"

      - name: Create PostGIS extension
        run: >
          su - postgres
          -c "psql template1 -c 'create extension postgis'"

      - name: Install Tox, tox-uv and tox-gh-actions
        run: pip install tox tox-uv tox-gh-actions

      - name: Test with Tox
        run: tox

      - name: Install git and curl for codecov action
        run: apt-get install -y git curl

      - name: Upload coverage data to codecov.io
        uses: codecov/codecov-action@v5
        with:
          token: ${{secrets.CODECOV_TOKEN}}

  test-dockerization:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        uses: docker/setup-buildx-action@v1

      - name: Build Docker image of the app
        run: docker compose build

      - name: Start the services with docker compose up
        run: docker compose up -d

      - name: Run pytest in the app container
        run: USE_DOCKER=1 ./run-pytest -vvv

  checks:
    strategy:
      matrix:
        toxenv: [style, uvlock, sanitizer]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install GDAL
        run: sudo apt-get update && sudo apt-get install -y gdal-bin
        if: ${{ matrix.toxenv == 'sanitizer' }}

      - name: Install Tox, tox-uv and tox-gh-actions
        run: pip install tox tox-uv tox-gh-actions

      - name: Run the check with Tox
        run: tox
        env:
          TOXENV: ${{matrix.toxenv}}
